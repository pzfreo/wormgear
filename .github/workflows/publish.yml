name: Publish to PyPI

on:
  release:
    types: [published]  # Triggers when GitHub Release is created
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  # Stage on TestPyPI first. A bad release (missing files, broken metadata,
  # import errors) is unrecoverable on real PyPI — once a version is up, it
  # can't be replaced, only superseded. TestPyPI lets us catch the failure
  # before it's permanent.
  #
  # Setup (one-time, by repo maintainer in GitHub UI):
  #   1. Settings → Environments → New environment named "testpypi"
  #   2. Register the project on TestPyPI (https://test.pypi.org)
  #   3. TestPyPI Account → Publishing → add trusted publisher with:
  #        owner: pzfreo
  #        repo:  wormgear
  #        workflow: publish.yml
  #        environment: testpypi
  publish-testpypi:
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write  # Required for trusted publishing

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true  # Re-runs of the workflow shouldn't fail
                              # if a previous attempt already uploaded.

      - name: Smoke-test from TestPyPI
        # Wait briefly for TestPyPI to index, then install from there and
        # verify the package imports. Catches metadata / file-list bugs that
        # only surface after upload.
        run: |
          sleep 30
          python -m pip install --upgrade pip
          # --index-url points to TestPyPI; --extra-index-url falls back to
          # real PyPI for our dependencies (build123d et al.).
          python -m pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            wormgear
          python -c "import wormgear; print(f'OK wormgear {wormgear.__version__}')"

  publish:
    needs: publish-testpypi  # only run if TestPyPI validated cleanly
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Required for trusted publishing

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
